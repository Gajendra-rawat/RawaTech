<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>RawaTech Dashboard</title>

  <!-- ✅ PWA MANIFEST -->
  <link rel="manifest" href="manifest.json">

  <!-- ✅ Theme & iOS Support -->
  <meta name="theme-color" content="#3a4a22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RawaTech">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="RawaTech Restaurant Management System">

  <!-- ✅ iOS Icons -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #2d3a1e 0%, #4a6030 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .splash {
      text-align: center;
      padding: 40px 24px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      overflow: hidden;
      margin: 0 auto 20px auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border: 3px solid rgba(138, 180, 68, 0.5);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #8ab444;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .open-btn {
      display: inline-block;
      background: #8ab444;
      color: #1a2410;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(138, 180, 68, 0.4);
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(138, 180, 68, 0.5);
    }

    .open-btn:active {
      transform: translateY(0);
    }

    /* ---- Install Banner ---- */
    #installBanner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, #2d3a1e, #3a4a22);
      padding: 14px 20px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
      z-index: 9999;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .banner-inner {
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .banner-icon { font-size: 36px; flex-shrink: 0; }

    .banner-text { flex: 1; }
    .banner-text strong {
      display: block;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .banner-text span {
      font-size: 11px;
      color: #8ab444;
    }

    .install-btn {
      background: #8ab444;
      color: #1a2410;
      border: none;
      padding: 9px 18px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .close-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* iOS Hint */
    .ios-hint {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      display: none;
    }

    .ios-hint span { font-size: 18px; }

    /* Offline indicator */
    #offlineBar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #c62828;
      color: white;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 700;
      z-index: 99999;
    }
  </style>
</head>
<body>

  <!-- Offline bar -->
  <div id="offlineBar">📵 Internet connection nahi hai</div>

  <div class="splash">
    <div class="logo-wrap">
      <img src="icon-512.png" alt="RawaTech Logo">
    </div>
    <h1>RawaTech</h1>
    <div class="subtitle">Restaurant Management System</div>

    <!-- ⚠️ APNA GOOGLE APPS SCRIPT URL YAHAN DAALO -->
    <a
      class="open-btn"
      id="mainAppBtn"
      href="https://script.google.com/macros/s/AKfycbyTQBztzyMzrLv2q7qEDeUjScsh6wn7q37tDy_IGDpvlonz7IM5g7HEa3p1a2ThVTNu/exec"
      target="_self"
    >
      🚀 Dashboard Kholo
    </a>

    <!-- iOS Install Hint -->
    <div class="ios-hint" id="iosHint">
      <span>📲</span> iPhone par install karne ke liye:<br>
      Safari mein <strong>Share ⬆️</strong> → <strong>"Add to Home Screen"</strong> tap karein
    </div>
  </div>

  <!-- Android Install Banner -->
  <div id="installBanner">
    <div class="banner-inner">
      <div class="banner-icon">📲</div>
      <div class="banner-text">
        <strong>RawaTech App Install Karein</strong>
        <span>Home screen pe add karein — bilkul native app jaisi!</span>
      </div>
      <button class="install-btn" id="installBtn">INSTALL</button>
      <button class="close-btn" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
    </div>
  </div>

  <script>
    // ✅ Service Worker Register
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ SW Registered'))
        .catch(e => console.log('SW Error:', e));
    }

    // ✅ PWA Install Prompt (Android Chrome)
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // 3 second baad banner dikhao
      setTimeout(() => {
        document.getElementById('installBanner').style.display = 'block';
      }, 2000);
    });

    document.getElementById('installBtn').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(result => {
          if (result.outcome === 'accepted') {
            document.getElementById('installBanner').style.display = 'none';
          }
          deferredPrompt = null;
        });
      }
    });

    // ✅ iOS Check
    const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true
      || window.matchMedia('(display-mode: standalone)').matches;

    if (isIos && !isStandalone) {
      document.getElementById('iosHint').style.display = 'block';
    }

    // ✅ Offline Detection
    window.addEventListener('offline', () => {
      document.getElementById('offlineBar').style.display = 'block';
    });
    window.addEventListener('online', () => {
      document.getElementById('offlineBar').style.display = 'none';
    });

    // ✅ Already installed? Direct redirect
    if (isStandalone) {
      // App installed hai — seedha open ho
      const appBtn = document.getElementById('mainAppBtn');
      // Optional: Auto open
      // window.location.href = appBtn.href;
    }
  </script>
</body>
</html>
